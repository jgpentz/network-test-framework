name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Ruff formatter
        run: uv run ruff format --check .

      - name: Run Ruff linter
        run: uv run ruff check .